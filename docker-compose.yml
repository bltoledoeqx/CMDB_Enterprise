services:
  cmdb:
    build: .
    container_name: cmdb-enterprise
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - cmdb-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - SESSION_SECRET=mude-esta-chave-em-producao-2024
      - KAVITA_URL=http://kavita:5000
    depends_on:
      - kavita
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    restart: unless-stopped
    volumes:
      - /data/livros:/manga        # pasta de livros no host → /manga no container
      - kavita-config:/kavita/config
    environment:
      - TZ=America/Sao_Paulo
    # Porta 5000 NÃO exposta externamente — acesso só via proxy do CMDB

volumes:
  cmdb-data:
    driver: local
  kavita-config:
    driver: local
