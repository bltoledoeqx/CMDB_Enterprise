services:
  cmdb:
    build: .
    container_name: cmdb-enterprise
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - cmdb-data:/data
      - /opt/livros:/livros
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - BOOKS_DIR=/livros
      - KAVITA_URL=http://kavita:5000
      - SESSION_SECRET=mude-esta-chave-em-producao-2024
    depends_on:
      kavita:
        condition: service_started
    networks:
      - npm_proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    restart: unless-stopped
    volumes:
      - /opt/livros:/manga
      - kavita-config:/kavita/config
    environment:
      - TZ=America/Sao_Paulo
      - KAVITA__BaseUrl=/biblioteca/
    networks:
      - npm_proxy

networks:
  npm_proxy:
    external: true   # rede já existente do Nginx Proxy Manager — não recria

volumes:
  cmdb-data:
    driver: local
  kavita-config:
    driver: local
